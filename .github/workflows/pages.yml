# Deploy the Vite SPA to GitHub Pages.
# Repo Settings → Pages → Source: GitHub Actions.
#
# Required repo variable (Settings → Secrets and variables → Actions → Variables):
#   VITE_API_URL = https://<your-app>.fly.dev
#
# Optional variable:
#   VITE_BASE = /<repo-name>/   (default / for user/org site or custom domain)

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_BASE: ${{ vars.VITE_BASE || '/' }}
        run: |
          npm ci
          npm run build
          # SPA fallback for client-side hash/history routes on cold loads
          cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
